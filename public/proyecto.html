<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revoltosos - Integrantes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#000000,#3b0a45,#5c0000);min-height:100vh;}
.hero{padding:60px 0;color:white;text-align:center;}
.card{border:none;border-radius:20px;overflow:hidden;transition:.3s;box-shadow:0 10px 25px rgba(0,0,0,.15)}
.card:hover{transform:translateY(-8px) scale(1.02)}
.avatar{height:240px;object-fit:cover;background:#f8f9fa}
.badge-team{background:#198754}
</style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
<div class="container"><a class="navbar-brand fw-bold" href="../index.html">← Volver</a></div>
</nav>
<section class="hero">
<div class="container">
<h1 class="display-4 fw-bold">Proyecto Revoltosos</h1>
<p class="lead">Conoce a los integrantes del equipo</p>
</div>
</section>
<div class="container pb-5">
<div class="row g-4" id="galeria"></div>
</div>
<script>
const integrantes=[
'Ediccson','Mauricio','Carlos','Eliana','Diego B','Magno','Mega'
];
const galeria=document.getElementById('galeria');
integrantes.forEach(nombre=>{
 const col=document.createElement('div');
 col.className='col-md-6 col-lg-4';
 const img=`https://api.dicebear.com/7.x/micah/svg?seed=${encodeURIComponent(nombre)}`;
 col.innerHTML=`<div class="card h-100 text-center">
 <img src="${img}" class="avatar w-100" alt="${nombre}">
 <div class="card-body">
 <span class="badge badge-team mb-2">Superhéroe</span>
 <h3 class="h4 fw-bold">${nombre}</h3>
 <p class="text-muted">Guerrero del proyecto Revoltosos con poderes especiales ⚡🔥</p>
 </div></div>`;
 galeria.appendChild(col);
});
</script>
</body>
</html>
