<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
   <link rel="stylesheet" href="src/styles/styleLogin.css">

</head>

<body>

    <div class="container">
        <h1>Registro</h1>
        <p>Esta vaina la hizo Eliana Martinez</p>
        <form action="/register" method="post">

            <div class="input-group">
                <label for="name">Nombre completo</label>
                <input type="text" id="name" name="name" placeholder="Tu nombre" required>
            </div>

            <div class="input-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="Crea una contraseña" required>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repite la contraseña" required>
            </div>

            <button type="submit">Registrarse</button>

        </form>

        <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
    </div>

</body>
</html>
